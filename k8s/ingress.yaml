apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redis-graph-agent
  namespace: your-namespace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type
    nginx.ingress.kubernetes.io/cors-allow-methods: POST, GET, OPTIONS
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: redis-agent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redis-graph-agent
                port:
                  number: 8080
  tls:
    - hosts:
        - redis-agent.example.com
      secretName: redis-agent.example.com-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redis-mcp-server
  namespace: your-namespace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, OPTIONS
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: redis-mcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redis-mcp-server
                port:
                  number: 8000
  tls:
    - hosts:
        - redis-mcp.example.com
      secretName: redis-mcp.example.com-tls
